feature: login
source_spec: qa-workspace/specs/login/spec.md
test_cases:
  - id: TC-LOGIN-001
    requirement_id: AUTH-LOGIN-001
    title: 正確帳密登入成功
    type: e2e
    priority: high
    preconditions:
      - 測試帳號存在
      - 測試帳號狀態正常
    steps:
      - 開啟登入頁
      - 輸入正確帳號
      - 輸入正確密碼
      - 點擊登入
    expected:
      - 使用者成功登入
      - 使用者進入首頁
    automation_candidate: true

  - id: TC-LOGIN-002
    requirement_id: AUTH-LOGIN-002
    title: 錯誤密碼登入失敗
    type: e2e
    priority: high
    preconditions:
      - 測試帳號存在
      - 測試帳號狀態正常
    steps:
      - 開啟登入頁
      - 輸入正確帳號
      - 輸入錯誤密碼
      - 點擊登入
    expected:
      - 系統顯示帳號或密碼錯誤
      - 使用者停留在登入頁
    automation_candidate: true

  - id: TC-LOGIN-003
    requirement_id: AUTH-LOGIN-003
    title: 停用帳號不可登入
    type: e2e
    priority: high
    preconditions:
      - 測試帳號存在
      - 測試帳號狀態為停用
    steps:
      - 開啟登入頁
      - 輸入停用帳號
      - 輸入正確密碼
      - 點擊登入
    expected:
      - 系統顯示帳號已停用
      - 使用者停留在登入頁
    automation_candidate: true
